{% extends 'base.html' %}

{% block content %}

<h1>My Blogs</h1>

{% for blog in blogs %}
    <div class="blog-card">
        <h2>
            <a href="{{ blog.get_absolute_url }}">
                {{ blog.title }}
            </a>
        </h2>

        <p>{{ blog.content|truncatewords:20 }}</p>
        <p><small>{{ blog.created_at }}</small></p>
    </div>
{% endfor %}

{% endblock %}
